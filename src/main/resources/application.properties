spring.application.name=people-core-platform

spring.datasource.url=jdbc:postgresql://localhost:5432/EMS_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.main.lazy-initialization=true


# Retry Configuration
webhook.retry.max-attempts=3
webhook.retry.initial-interval-ms=1000


spring.jackson.time-zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

server.port=9191


management.endpoints.web.exposure.include=health,info,metrics,env,beans,loggers,prometheus,threaddump,heapdump
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.prometheus.metrics.export.enabled=true


# APPLICATION INFORMATION
info.app.name=PeopleCore - Enterprise Workforce Management Platform
info.app.description=Enterprise Workforce Management Platform
info.app.version=1.0.0
info.app.encoding=UTF-8
info.app.java.version=21
info.app.company=MsgQ Technology Pvt Ltd
info.app.developer=Rajkumar Prasad
